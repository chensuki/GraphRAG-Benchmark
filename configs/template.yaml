# GraphRAG Benchmark 实验配置
# 参数说明：全局参数 + 框架特有参数

# 运行控制
run:
  framework: clearrag          # auto, all, 或框架名
  run_id: exp-001              # 实验ID（留空自动生成）
  continue_on_error: false     # 出错时是否继续

# 数据集配置
dataset:
  subset: sample               # sample, medical, novel, hotpotqa_distractor, 2wikimultihop, musique
  sample: 5                 # 问题采样数（null=全部）
  corpus_sample: null          # 语料库采样数（null=全部）

# LLM 配置
llm:
  model: deepseek-chat
  base_url: https://api.deepseek.com/v1
  api_key: ""

# 嵌入配置
embedding:
  type: local                    # api | local
  provider: zhipu                # zhipu | openai | custom (仅 type=api 时有效)
  model: BAAI/bge-large-en-v1.5  # 模型名称（本地模型会自动从 HuggingFace 缓存加载）
  dimensions: 1024               # 向量维度（null=API默认）
  batch_size: 64                 # 批处理大小
  base_url: https://open.bigmodel.cn/api/paas/v4  # zhipu; openai=https://api.openai.com/v1
  api_key: ""

# 检索配置
retrieval:
  top_k: 5

# Neo4j 配置
neo4j:
  uri: bolt://localhost:7687
  user: neo4j
  password: your-password
  database: neo4j

# 输出路径
# predictions: {output.root}/{framework}/{subset}/{run_id}/
# workspace: 由各框架配置中的 workspace_dir 指定
output:
  root: ./results

# OpenClaw 通知配置（可选）
# 使用 WebSocket chat.send 发送消息到指定会话
notification:
  enabled: false                          # 是否启用通知
  gateway_url: http://127.0.0.1:18789     # OpenClaw Gateway 地址
  token: ${OPENCLAW_TOKEN}                # API token（建议用环境变量）
  # sessionKey 格式: agent:{agentId}:{platform}:{type}:{id}
  # 示例: agent:main:feishu:group:oc_1c7e1ca32c389ced68a7508df7bfb8fa
  session_key: ""                         # 完整的 sessionKey
  # 通知选项
  notify_on_start: false                   # 实验开始时通知
  notify_on_progress: false                # 进度更新时通知
  notify_on_complete: true                # 实验完成时通知
  notify_on_error: true                   # 实验出错时通知
  progress_interval: 0.5                  # 进度通知间隔（0.5 = 每 50%）

# 框架配置（仅框架特有参数）
frameworks:
  lightrag:
    enabled: true
    workspace_dir: ./workspace/lightrag_workspace    # 工作目录
    mode: API                         # API 或 ollama
    corpus_concurrency: 1             # 语料库并发数
    skip_build: false                 # 跳过索引构建
    index_only: false                 # 仅构建索引
    chunk_token_size: 1200            # 分块大小
    chunk_overlap_token_size: 100     # 分块重叠

  clearrag:
    enabled: true
    workspace_dir: ./workspace/clearrag_workspace   # 工作目录
    activation_mode: semantic_propagation   # vector_search(快) / semantic_propagation(精确)
    passage_retrieval_mode: none            # vector / pagerank / none
    fast: false                             # 快速模式（禁用 Reflexion）
    max_concurrency: 5                      # 构建并发数
    corpus_concurrency: 2                   # 语料库并发数
    # 切分参数
    chunk_size: 1200                        # 分块大小（tokens）
    chunk_overlap: 100                      # 分块重叠（tokens）
    # 构建参数
    max_tool_calls: 3                       # Agent 工具调用上限
    max_tokens: 8192                        # LLM 输出 token 上限
    similarity_threshold: 0.95              # 实体去重相似度阈值
    # 查询参数
    vector_search_top_k: 100                # 向量搜索召回数量
    activation_threshold: 0.8               # 向量激活阈值
    max_context_length: 10000               # 上下文最大字符数
    max_passage_content_length: 2000        # 单段落最大字符数
    skip_build: false

  linearrag:
    enabled: true
    workspace_dir: ./workspace/linearrag_workspace   # 工作目录
    max_iterations: 3                 # 最大迭代次数
    iteration_threshold: 0.4          # 迭代阈值
    top_k_sentence: 3                 # 每个实体的 top-k 句子数
    use_vectorized: false             # 向量化检索
    spacy_model: en_core_web_trf      # NER 模型
    max_workers: 8                    # NER 并发数
    corpus_concurrency: 1             # 语料库并发数
    skip_build: false
    chunk_token_size: 1200            # 分块大小
    chunk_overlap_token_size: 100     # 分块重叠

  fast-graphrag:
    enabled: true
    workspace_dir: ./workspace/fast-graphrag_workspace   # 工作目录
    mode: API                              # API 或 ollama
    corpus_concurrency: 1                  # 语料库并发数
    skip_build: false
    # 高级参数（可选）
    domain: ""                             # 自定义分析域（空则使用默认）
    entity_types: []                       # 自定义实体类型（空则使用默认）

  hipporag2:
    enabled: true
    workspace_dir: ./workspace/hipporag2_workspace   # 工作目录
    mode: API                              # API 或 ollama
    embed_type: local                      # HippoRAG2 仅支持本地模型
    embed_model_path: "BAAI/bge-large-en-v1.5"  # 本地 embedding 模型路径（必需）
    corpus_concurrency: 1                  # 语料库并发数
    skip_build: false
    # 高级参数（可选）
    chunk_token_size: 256                  # 分块 token 大小
    chunk_overlap: 32                      # 分块重叠
    force_index_from_scratch: true         # 强制从头构建索引
    rerank_dspy_file_path: "hipporag/prompts/dspy_prompts/filter_llama3.3-70B-Instruct.json"
    max_qa_steps: 3                        # QA 最大步骤数
    graph_type: "facts_and_sim_passage_node_unidirectional"
    embedding_batch_size: 8
    openie_mode: "online"                  # online / offline

  digimon:
    enabled: false